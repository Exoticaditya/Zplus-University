spring.application.name=zplus-university
server.port=8080

# Database Configuration (File-Based H2 for Persistence)
# Save data to ./data/zplusdb in the project root
spring.datasource.url=jdbc:h2:file:./data/zplusdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
