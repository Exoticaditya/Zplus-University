# ===========================================
# Zplus University - Application Properties
# ===========================================
# This file supports BOTH Local (H2) and Cloud (MySQL) deployments
# via Spring Profiles: 'dev' for local, 'prod' for cloud.

spring.application.name=zplus-university
server.port=${PORT:8080}

# ===========================================
# Local Development Profile (H2) - Default
# ===========================================
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/zplusdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:password}

# JPA Settings (auto-detect dialect based on driver)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (only for local dev, disabled in prod)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

# ===========================================
# CORS Configuration
# ===========================================
# Allows frontend (Vercel) to talk to backend (Render)
# Set FRONTEND_URL env var in Render to your Vercel URL
cors.allowed.origins=${FRONTEND_URL:http://localhost:5173}
